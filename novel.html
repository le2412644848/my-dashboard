<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小说写作助手</title>
<style>
:root {
  --bg: #0b0e14;
  --bg2: #11161f;
  --card: #181e2b;
  --card2: #1f2637;
  --border: #2a3143;
  --text: #e4e9f2;
  --text2: #8b95a8;
  --text3: #5a6478;
  --accent: #6c8cff;
  --accent2: #5ce0a0;
  --accent3: #f0a840;
  --danger: #f0506a;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Noto Serif SC", "Source Han Serif SC", "Microsoft YaHei", serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.7;
  -webkit-tap-highlight-color: transparent;
}
.page {
  display: none;
  max-width: 760px;
  margin: 0 auto;
  padding: 0 16px 16px;
  min-height: 100vh;
  animation: fadeIn .25s ease;
}
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.header .logo {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
  flex: 1;
}
.header .back {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.header .back:hover { border-color: var(--accent); color: var(--text); }
.header .icon-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.header .icon-btn:hover { border-color: var(--accent); color: var(--text); }
.model-switch {
  display: flex;
  gap: 0;
  background: var(--card);
  border-radius: 20px;
  padding: 3px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.model-switch button {
  border: none;
  background: transparent;
  color: var(--text3);
  padding: 5px 14px;
  border-radius: 18px;
  font-size: 12px;
  cursor: pointer;
  transition: all .25s;
  font-weight: 600;
}
.model-switch button.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(108,140,255,.35);
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 22px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  cursor: pointer;
  font-weight: 600;
  transition: all .2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #4a6fe0);
  color: #fff;
  width: 100%;
  box-shadow: 0 4px 14px rgba(108,140,255,.25);
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); background: var(--card2); }
.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
  padding: 4px 12px;
  font-size: 12px;
  border-radius: 6px;
}
.btn-sm { padding: 8px 16px; font-size: 13px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--accent);
  opacity: 0;
  transition: opacity .25s;
}
.card:hover { border-color: var(--accent); transform: translateX(2px); }
.card:hover::before { opacity: 1; }
.card h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.card .meta { font-size: 13px; color: var(--text2); line-height: 1.5; }
.card .tag {
  display: inline-block;
  background: rgba(108,140,255,.12);
  color: var(--accent);
  padding: 2px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
}
.card .progress-bar {
  height: 3px;
  background: var(--bg2);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.card .progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width .5s ease;
}
.empty {
  text-align: center;
  padding: 70px 20px 40px;
  color: var(--text2);
}
.empty .icon { font-size: 56px; margin-bottom: 14px; opacity: .6; }
.empty p { font-size: 14px; }
.chapter-item {
  display: flex;
  align-items: center;
  gap: 12px;
}
.chapter-item .ch-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text3);
  flex-shrink: 0;
}
.chapter-item .info { flex: 1; min-width: 0; }
.chapter-item .info .ch-title {
  font-size: 15px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chapter-item .info .ch-meta {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.chapter-item .actions { display: flex; gap: 4px; flex-shrink: 0; }
.writing-container { flex: 1; display: flex; flex-direction: column; padding-bottom: 0; }
.paper {
  flex: 1;
  overflow-y: auto;
  position: relative;
}

/* 滚动按钮 */
.scroll-btns {
  position: absolute;
  right: 8px;
  bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 5;
  opacity: 0;
  transition: opacity .3s;
}
.paper:hover .scroll-btns,
.scroll-btns.show { opacity: 1; }
.scroll-btns button {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card2);
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.scroll-btns button:active { transform: scale(.9); }
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-bottom: 12px;
  min-height: 200px;
  max-height: calc(100vh - 220px);
  line-height: 1.9;
  font-size: 15px;
}
.paper .chapter-content { word-wrap: break-word; }
.paper .chapter-content p { text-indent: 2em; margin-bottom: 0.8em; line-height: 2; }
.paper .chapter-content .empty-hint {
  color: var(--text3);
  text-align: center;
  padding: 40px 20px;
  font-size: 14px;
  line-height: 2;
}
.paper .chapter-content .empty-hint .big { font-size: 28px; display: block; margin-bottom: 10px; }
.paper .loading-overlay {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 30px 0;
  color: var(--text2);
  font-size: 14px;
}
.paper .loading-overlay .spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.input-section { flex-shrink: 0; padding-bottom: 12px; }
.input-section .input-row { display: flex; gap: 10px; }
.input-section .input-row textarea {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 12px 16px;
  font-size: 15px;
  resize: none;
  min-height: 48px;
  max-height: 130px;
  font-family: inherit;
  line-height: 1.6;
  transition: border-color .2s;
}
.input-section .input-row textarea:focus { outline: none; border-color: var(--accent); }
.input-section .input-row .send-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), #4a6fe0);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 12px rgba(108,140,255,.3);
  transition: all .2s;
}
.input-section .input-row .send-btn:disabled { opacity: .4; cursor: not-allowed; }
.input-section .input-hint { font-size: 12px; color: var(--text3); text-align: right; padding: 6px 4px 0; }
.input-section .quick-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.input-section .quick-actions .qa-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
}
.input-section .quick-actions .qa-btn:hover { border-color: var(--accent); color: var(--text); }
.model-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 700;
  margin-bottom: 4px;
}
.model-badge.flash { background: rgba(108,140,255,.15); color: var(--accent); }
.model-badge.pro { background: rgba(240,168,64,.15); color: var(--accent3); }
.wordcount-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 10px;
}
.wordcount-bar .bar-track {
  flex: 1;
  height: 3px;
  background: var(--bg2);
  border-radius: 2px;
  overflow: hidden;
}
.wordcount-bar .bar-track .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  transition: width .5s ease;
}
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%;
  max-width: 440px;
  max-height: 85vh;
  overflow-y: auto;
  animation: modalIn .2s ease;
  box-shadow: var(--shadow);
}
@keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal h2 { font-size: 19px; font-weight: 700; margin-bottom: 18px; }
.modal label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.modal input, .modal select, .modal textarea {
  width: 100%;
  padding: 11px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px;
  margin-bottom: 14px;
  font-family: inherit;
  transition: border-color .2s;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
.modal textarea { resize: vertical; min-height: 80px; }
.modal .btn-group { display: flex; gap: 10px; margin-top: 4px; }
.modal .btn-group .btn { flex: 1; }
.style-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.style-tags .tag-btn {
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.style-tags .tag-btn.selected {
  border-color: var(--accent);
  background: rgba(108,140,255,.12);
  color: var(--accent);
  font-weight: 600;
}
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.confirm-overlay.active { display: flex; }
.confirm-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%;
  max-width: 340px;
  text-align: center;
  animation: modalIn .2s ease;
}
.confirm-box p { margin-bottom: 20px; font-size: 15px; line-height: 1.6; }
.confirm-box .btn-group { display: flex; gap: 10px; }
.confirm-box .btn-group .btn { flex: 1; }
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 22px;
  font-size: 14px;
  z-index: 300;
  display: none;
  box-shadow: 0 6px 30px rgba(0,0,0,.5);
  white-space: nowrap;
}
.toast.show { display: block; animation: toastIn .25s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.prompt-editor { margin-bottom: 12px; }
.prompt-editor textarea {
  width: 100%;
  min-height: 200px;
  font-size: 13px;
  font-family: "SF Mono", "Fira Code", monospace;
  line-height: 1.6;
  padding: 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  resize: vertical;
}
.prompt-editor textarea:focus { outline: none; border-color: var(--accent); }
.prompt-editor .prompt-info { font-size: 12px; color: var(--text3); margin-bottom: 8px; line-height: 1.5; }
.prompt-editor .prompt-vars { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.prompt-editor .prompt-vars .var-tag {
  background: rgba(108,140,255,.1);
  color: var(--accent);
  padding: 2px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-family: monospace;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-width: 480px) {
  .page { padding: 0 12px 12px; }
  .paper { padding: 18px 14px; font-size: 14px; }
  .modal { padding: 22px 18px; }
  .header { padding: 10px 0 14px; }
}
</style>
</head>

// ===== AI 生成大纲 =====
async function generateOutline() {
  const title = document.getElementById('novelTitle').value.trim();
  if (!title) { showToast('请先输入书名'); return; }
  const sel = document.querySelector('#styleTags .tag-btn.selected');
  let style = sel ? sel.dataset.style : '古风';
  const custom = document.getElementById('novelCustomStyle').value.trim();
  if (custom) style = custom;
  const btn = document.getElementById('outlineBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中…';
  document.getElementById('outlineResult').innerHTML = '<div style="color:var(--text3)">正在生成大纲，约15秒…</div>';
  try {
    const prompt = `你是一位资深小说编辑。请为一部${style}风格的小说《${title}》生成一个10章的章节大纲。

要求：
1. 每章用一句话概括核心剧情
2. 章节之间要有连贯性，有起承转合
3. 格式：每行一个章节，如第一章：标题——剧情概要
4. 只输出大纲，不要多余的解释`;
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
      body: JSON.stringify({ model: MODELS['flash'], messages: [{ role: 'system', content: '你是一位专业的小说编辑，擅长规划章节结构。' }, { role: 'user', content: prompt }], max_tokens: 2000, temperature: 0.7 })
    });
    if (!res.ok) throw new Error('API 请求失败');
    const d = await res.json();
    const outline = d.choices?.[0]?.message?.content || '';
    document.getElementById('outlineResult').innerHTML = '<div style="font-size:12px;color:var(--text3);margin-bottom:4px;">📋 生成的大纲（创建后可在故事设定中编辑）</div><pre style="white-space:pre-wrap;font-size:13px;line-height:1.7;background:var(--bg2);padding:12px;border-radius:8px;margin:0;">' + esc(outline) + '</pre>';
    // 保存大纲到临时变量，创建小说时写入 bible
    window._pendingOutline = outline;
    showToast('✅ 大纲已生成');
  } catch (err) {
    document.getElementById('outlineResult').innerHTML = '<div style="color:var(--danger);font-size:13px;">❌ ' + esc(err.message) + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ AI 生成大纲';
  }
}

// ===== AI 自动为章节命名 =====
async function suggestTitle(content, chapter) {
  try {
    const prompt = '请为以下小说章节内容起一个标题（4-10个字，不要包含第x章）。直接输出标题，不要解释。

' + content.slice(0, 500);
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
      body: JSON.stringify({ model: MODELS['flash'], messages: [{ role: 'user', content: prompt }], max_tokens: 50, temperature: 0.5 })
    });
    if (!res.ok) return;
    const d = await res.json();
    const title = (d.choices?.[0]?.message?.content || '').replace(/[「」]/g, '').trim();
    if (title && title.length < 30) {
      chapter.title = title;
      saveData();
      renderWrite();
      showToast('✅ 完成 · 自动命名：《' + title + '》');
    }
  } catch(e) {}
}

// ===== 全屏写作模式 =====
function toggleFullscreen() {
  const el = document.getElementById('page-write');
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.querySelector('.icon-btn[onclick*="toggleFullscreen"]');
  if (btn) btn.textContent = document.fullscreenElement ? '✕' : '⛶';
});



// ===== 常量 =====
let API_KEY = localStorage.getItem('nwApiKey') || 'sk-d22337905ead4e03aa0ebebbf1973234';
const API_URL = 'https://api.deepseek.com/v1/chat/completions';
const MODELS = { flash: 'deepseek-chat', pro: 'deepseek-reasoner' };

const DEFAULT_PROMPT = `你是一位专业的小说写作助手。正在写一部{style}风格的小说。

{model_style}

【已写章节概要】
{prev_chapters}

写作要求：
1. 每次生成长度不少于2000字，可更多
2. 用中文写作，语言符合{style}风格
3. 严格按照故事设定和人物性格推进，保持全文连贯
4. 注意呼应前文，不要出现前后矛盾
5. 对话格式："人物名：说话内容"
6. 段间空行
7. 不写标题，只写正文
8. 不输出解释，直接写小说
9. 严格按用户要求展开

{context}`;

// ===== 状态 =====
let currentModel = 'flash';
let novels = [];
let currentNovelId = null;
let currentChapterId = null;
let isWriting = false;
let customPrompt = null;

// ===== 数据层 =====
function loadData() {
  try {
    const d = localStorage.getItem('novelWriterData');
    if (d) {
      const p = JSON.parse(d);
      novels = p.novels || [];
      currentModel = p.currentModel || 'flash';
      customPrompt = p.customPrompt || null;
      if (document.getElementById('settingsModel')) {
        document.getElementById('settingsModel').value = currentModel;
      }
    }
  } catch(e) { novels = []; }
  updateModelUI();
}
function saveData() {
  localStorage.setItem('novelWriterData', JSON.stringify({ novels, currentModel, customPrompt }));
  // 自动保存提示（防抖）
  clearTimeout(window._saveToastTimer);

// 直接发送，不经过输入框
// isFullMessage=true 时 userText 已经是完整的用户消息，不包装
async function doWrite(userText, isFullMessage) {
  if (isWriting) return;
  try {
    isWriting = true;
    document.getElementById('sendBtn').disabled = true;
    const n = getNovel();
    if (!n || !n.chapters) throw new Error('找不到小说数据');
    const c = n.chapters[currentChapterId];
    if (!c) throw new Error('找不到当前章节');
    
    const contentEl = document.getElementById('chapterContent');
    if (contentEl) {
      contentEl.innerHTML = esc(c.content || '') + '<div class="loading-overlay"><div class="spinner"></div><span>✍ 写作中…（约2000字）</span></div>';
    }
    
    const model = currentModel;
    const systemPrompt = buildSystemPrompt();
    const existingContent = c.content || '';
    let userMsg;
    if (isFullMessage) {
      userMsg = userText;
    } else {
      userMsg = existingContent
        ? `继续写本章：${userText}`
        : `写一章新的${n.style}小说：${userText}`;
    }
    
    const messages = [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }];
    if (c.history && c.history.length > 0) {
      const recent = c.history.slice(-4);
      messages.splice(1, 0, ...recent.map(h => ({ role: h.role, content: h.content })));
    }
    
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({ model: MODELS[model], messages, max_tokens: 4000, temperature: model === 'flash' ? 0.8 : 0.9, stream: true })
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    
    // 流式读取
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullReply = '';
    let buffer = '';
    
    // 显示loading占位
    if (contentEl) {
      contentEl.innerHTML = esc(c.content || '') + '<div id="streamOutput" style="white-space:pre-wrap;line-height:1.9;"></div>';
    }
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      // 解析 SSE 事件
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content || '';
          if (delta) fullReply += delta;
        } catch(e) { /* 跳过解析失败的行 */ }
      }
      // 实时更新显示
      const streamEl = document.getElementById('streamOutput');
      if (streamEl) streamEl.textContent = fullReply;
    }
    
    let reply = fullReply.trim();
    reply = reply.replace(/^第[一二三四五六七八九十百千]+章[：:。]?\s*\n?/, '').trim();
    // 保证段落之间有空行：把单个换行变成双换行（但保留已有的双换行）
    reply = reply.replace(/\n{3,}/g, '\n\n').replace(/([^\n])\n([^\n])/g, '$1\n\n$2');
    
    if (existingContent) c.content += '\n\n' + reply;
    else c.content = reply;
    c.summary = reply.replace(/\n/g, ' ').slice(0, 100) + (reply.length > 100 ? '…' : '');
    if (!c.history) c.history = [];
    c.history.push({ role: 'user', content: userText });
    c.history.push({ role: 'assistant', content: `（${reply.length}字）`, model });
    c.model = model;
    saveData();
    renderPaper();
    updateWordCountBar();
    showToast(`✅ 完成 · ${reply.length.toLocaleString()} 字`);
  } catch (err) {
    const el2 = document.getElementById('chapterContent');
    if (el2) {
      el2.innerHTML = `<div style="color:var(--danger);padding:20px;text-align:center;font-size:15px;">❌ 生成失败<br><br><span style="font-size:13px;color:var(--text2);">${esc(err.message || err)}</span></div>`;
    }
    showToast('❌ ' + (err.message || '失败'));
  } finally {
    isWriting = false;
    const sb = document.getElementById('sendBtn');
    if (sb) sb.disabled = false;
  }
}

// ===== 构建 system prompt =====
function buildBibleText() {
  const n = getNovel();
  if (!n || !n.bible) return '（未设置）';
  const b = n.bible;
  let t = '';
  if (b.synopsis) t += '【故事梗概】\n' + b.synopsis + '\n\n';
  if (b.characters) t += '【人物设定】\n' + b.characters + '\n\n';
  if (b.outline) t += '【章节大纲】\n' + b.outline + '\n\n';
  if (b.other) t += '【其他设定】\n' + b.other;
  return t.trim() || '（未设置）';
}
function buildPrevChaptersText() {
  const n = getNovel();
  if (!n) return '（无）';
  const chapters = n.chapters;
  if (chapters.length === 0) return '（无）';
  // 只显示当前章之前的章节摘要
  const end = currentChapterId !== null ? currentChapterId : chapters.length;
  const prev = chapters.slice(0, end);
  if (prev.length === 0) return '（无）';
  return prev.map((c, i) => {
    const words = (c.content || '').length;
    const sum = c.summary || `第${i+1}章（${words.toLocaleString()}字）`;
    return `第${i+1}章${c.title ? '：' + c.title : ''}: ${sum}`;
  }).join('\n');
}
function buildSystemPrompt() {
  const n = getNovel();
  const style = n ? n.style : '古风';
  const model = currentModel;
  const chapters = n ? n.chapters : [];
  const currentIdx = currentChapterId !== null ? currentChapterId : chapters.length - 1;
  const c = chapters[currentIdx] ? (chapters[currentIdx].content || '') : '';
  
  const modelStyle = model === 'flash'
    ? '文风轻快简洁，叙事流畅直白，读起来轻松。句子短促有力，节奏明快。'
    : '文风细腻繁复，描写丰富生动，注重氛围和细节。善用修辞，词藻优美，节奏舒缓。';
  
  // 构造上下文：当前章有内容就带当前章，新章节带上一章结尾
  let context = '';
  if (c) {
    // 续写当前章
    context = `以下是本章已写内容（最后3000字）：\n\`\`\`\n${c.slice(-3000)}\n\`\`\`\n\n基于已有内容续写，保持风格一致。`;
  } else if (currentIdx > 0 && chapters[currentIdx - 1]) {
    // 新章节：带上上一章最后500字（够接剧情，不浪费token）
    const prevContent = chapters[currentIdx - 1].content || '';
    if (prevContent) {
      context = `上一章结尾：\n\`\`\`\n${prevContent.slice(-500)}\n\`\`\`\n\n请从上一章结尾处接续，开始新的一章。`;
    }
  }
  
  const bible = buildBibleText();
  const prevChapters = buildPrevChaptersText();
  let template = customPrompt || DEFAULT_PROMPT;
  return template
    .replace(/\{style\}/g, style)
    .replace(/\{model_style\}/g, modelStyle)
    .replace(/\{bible\}/g, bible)
    .replace(/\{prev_chapters\}/g, prevChapters)
    .replace(/\{context\}/g, context);
}

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({ model: MODELS[model], messages, max_tokens: 4000, temperature: model === 'flash' ? 0.8 : 0.9, stream: true })
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`API ${res.status}: ${errText.slice(0, 200)}`);
    }
    // 流式读取
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullReply = '';
    let buffer = '';
    if (contentEl) {
      contentEl.innerHTML = esc(c.content || '') + '<div id="streamOutput" style="white-space:pre-wrap;line-height:1.9;"></div>';
    }
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content || '';
          if (delta) fullReply += delta;
        } catch(e) {}
      }
      const streamEl = document.getElementById('streamOutput');
      if (streamEl) streamEl.textContent = fullReply;
    }
    let reply = fullReply.trim();
    reply = reply.replace(/^第[一二三四五六七八九十百千]+章[：:。]?\s*\n?/, '').trim();
    // 保证段落之间有空行
    reply = reply.replace(/\n{3,}/g, '\n\n').replace(/([^\n])\n([^\n])/g, '$1\n\n$2');
    if (existingContent) {
      c.content += '\n\n' + reply;
    } else {
      c.content = reply;
    }
    // 自动生成章节摘要（取前100字）
    if (!c.summary) {
      c.summary = reply.replace(/\n/g, ' ').slice(0, 100) + (reply.length > 100 ? '…' : '');
    }
    if (!c.history) c.history = [];
    c.history.push({ role: 'user', content: text });
    c.history.push({ role: 'assistant', content: `（${reply.length}字）`, model });
    c.model = model;
    saveData();
    renderPaper();
    updateWordCountBar();
    showToast(`✅ 完成 · ${reply.length.toLocaleString()} 字`);
  } catch (err) {
    const el2 = document.getElementById('chapterContent');
    if (el2) {
      el2.innerHTML = `<div style="color:var(--danger);padding:20px;text-align:center;font-size:15px;">❌ 生成失败<br><br><span style="font-size:13px;color:var(--text2);">${esc(err.message || err)}</span></div>`;
    }
    showToast('❌ ' + (err.message || '失败'));
  } finally {
    isWriting = false;
    const sb = document.getElementById('sendBtn');
    if (sb) sb.disabled = false;
    document.getElementById('userInput')?.focus();
  }
}

// ===== 设置 =====
function showSettings() {
  document.getElementById('promptEditor').value = customPrompt || DEFAULT_PROMPT;
  document.getElementById('settingsModel').value = currentModel;
  document.getElementById('settingsApiKey').value = API_KEY;
  showModal('settingsModal');
}
function toggleApiKeyVisibility() {
  const el = document.getElementById('settingsApiKey');
  const btn = el.nextElementSibling;
  if (el.type === 'password') { el.type = 'text'; btn.textContent = '隐藏'; }
  else { el.type = 'password'; btn.textContent = '显示'; }
}
function saveSettings() {
  customPrompt = document.getElementById('promptEditor').value.trim() || null;
  currentModel = document.getElementById('settingsModel').value;
  const key = document.getElementById('settingsApiKey').value.trim();
  if (key) {
    if (!key.startsWith('sk-')) { showToast('❌ API Key 格式不对'); return; }
    API_KEY = key;
    localStorage.setItem('nwApiKey', key);
  }
  saveData();
  updateModelUI();
  closeModal('settingsModal');
}
async function testApi() {
  const btn = document.querySelector('#settingsModal .btn-primary');
  if (!btn) return;
  const txt = btn.textContent;
  btn.textContent = '⏳ 测试…';
  btn.disabled = true;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({ model: MODELS[currentModel], messages: [{ role: 'user', content: '回复OK即可' }], max_tokens: 10 })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showToast('✅ API 连接成功！');
  } catch (err) {
    showToast('❌ API 失败：' + (err.message || err));
  } finally {
    btn.textContent = txt;
    btn.disabled = false;
  }
}
function resetDefaultPrompt() {
  document.getElementById('promptEditor').value = DEFAULT_PROMPT;
  showToast('已恢复默认');
}
function testPrompt() {
  const preview = buildSystemPrompt();
  showToast('📋 ' + preview.slice(0, 100) + '…');
}

// ===== 导出 =====
function exportNovel() {
  const n = getNovel();
  if (!n) return;
  let text = n.title + '\n风格：' + n.style + '\n' + '='.repeat(30) + '\n\n';
  n.chapters.forEach((c, i) => {
    text += `第${i+1}章${c.title ? '：' + c.title : ''}\n`;
    text += '-'.repeat(20) + '\n';
    text += (c.content || '（空）') + '\n\n';
  });
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = n.title + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('📥 导出成功');
}

loadData();
renderHome();

// Click overlay to close
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
});
document.querySelectorAll('.confirm-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
});
// Auto-save
document.addEventListener('visibilitychange', () => { if (document.hidden) saveData(); });
